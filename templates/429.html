{% extends "base.html" %}
{% block title %}429{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <h1 class="display-5">429</h1>
                <p class="lead">Too many requests. Please slow down and try again later.</p>
                <a href="{{ url_for('home') if session.get('user_id') else url_for('login') }}" class="btn btn-primary">Go Back</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
